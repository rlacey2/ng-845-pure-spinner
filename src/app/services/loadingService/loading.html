@if (loading()) {

  <div class="overlay"
       [style.background]="'rgba(0,0,0,' + opacity() + ')'">

    <!-- Spinner -->
    <div [ngClass]="spinnerClass()"></div>

    <!-- Messages -->
    <div class="messages">
      @for (m of messages(); track m.id) {
        <div>{{ m.text }}</div>
      }
    </div>

    <!-- Progress -->
    @if (showProgress()) {
      <div class="progress-bar">
        <div class="progress"
             [style.width.%]="progress()"></div>
      </div>
    }

  </div>

}
